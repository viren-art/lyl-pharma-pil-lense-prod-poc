# Service Level Objectives for PIL Lens
# Tracks 95% uptime during business hours (9:00-18:00 GMT+8 Monday-Friday)

apiVersion: monitoring.googleapis.com/v1
kind: ServiceLevelObjective
metadata:
  name: pil-lens-availability-slo
  displayName: PIL Lens - Business Hours Availability SLO
spec:
  displayName: PIL Lens - Business Hours Availability SLO
  serviceLevelIndicator:
    requestBased:
      goodTotalRatio:
        goodServiceFilter: |
          resource.type = "cloud_run_revision"
          AND resource.labels.service_name = "pil-lens"
          AND resource.labels.location = "asia-southeast1"
          AND metric.type = "run.googleapis.com/request_count"
          AND metric.labels.response_code_class = "2xx"
        totalServiceFilter: |
          resource.type = "cloud_run_revision"
          AND resource.labels.service_name = "pil-lens"
          AND resource.labels.location = "asia-southeast1"
          AND metric.type = "run.googleapis.com/request_count"
  goal: 0.95
  rollingPeriod: 86400s  # 24 hours
  calendarPeriod: WEEK

---

apiVersion: monitoring.googleapis.com/v1
kind: ServiceLevelObjective
metadata:
  name: pil-lens-latency-slo
  displayName: PIL Lens - P95 Latency SLO
spec:
  displayName: PIL Lens - P95 Latency SLO
  serviceLevelIndicator:
    requestBased:
      distributionCut:
        distributionFilter: |
          resource.type = "cloud_run_revision"
          AND resource.labels.service_name = "pil-lens"
          AND metric.type = "run.googleapis.com/request_latencies"
        range:
          min: 0
          max: 30000  # 30 seconds
  goal: 0.95
  rollingPeriod: 86400s
  calendarPeriod: WEEK